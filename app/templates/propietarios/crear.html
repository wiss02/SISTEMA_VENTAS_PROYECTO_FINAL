{% extends "base.html" %}

{% block title %}Nuevo Propietario - Inmobiliaria TEM742{% endblock %}
{% block header_title %}Registrar Propietario{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-6">
        <div class="card custom-card border-0">
            <div class="card-body p-5">
                <h4 class="fw-bold mb-4 text-primary"><i class="fa-solid fa-user-plus me-2"></i>Nuevo Propietario</h4>

                <form action="{{ url_for('propietarios.create_propietario') }}" method="POST">
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label for="nombre" class="form-label fw-semibold">Nombre Completo *</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez López">
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="ci_nit" class="form-label fw-semibold">CI / NIT *</label>
                            <input type="text" class="form-control" id="ci_nit" name="ci_nit" required placeholder="Ej. 1234567 LP">
                        </div>

                        <div class="col-12 col-md-6">
                            <label for="telefono" class="form-label fw-semibold">Teléfono *</label>
                            <input type="text" class="form-control" id="telefono" name="telefono" required placeholder="Ej. +591 71234567">
                        </div>

                        <div class="col-12">
                            <label for="correo" class="form-label fw-semibold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="correo" name="correo" placeholder="Ej. propietario@correo.com">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                        <a href="{{ url_for('propietarios.list_propietarios') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
