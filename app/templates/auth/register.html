<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Inmobiliaria TEM742</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="mb-1 text-primary font-weight-bold"><i class="fa-solid fa-hotel me-2"></i>TEM742</h2>
            <p class="text-muted">Crea una cuenta en la plataforma</p>
        </div>

        <!-- Flash alerts -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show small" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Nombre de Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" required placeholder="Ej. juan123">
                </div>
            </div>

            <div class="mb-3">
                <label for="nombre_completo" class="form-label fw-semibold">Nombre Completo</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" class="form-control border-start-0" id="nombre_completo" name="nombre_completo" required placeholder="Ej. Juan Pérez">
                </div>
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label fw-semibold">Correo Electrónico</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" class="form-control border-start-0" id="correo" name="correo" required placeholder="Ej. juan@dominio.com">
                </div>
            </div>

            <div class="mb-3">
                <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="contrasena" name="contrasena" required placeholder="Crea tu contraseña segura">
                </div>
            </div>

            <div class="mb-4">
                <label for="rol_id" class="form-label fw-semibold">Rol del Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user-gear"></i></span>
                    <select class="form-select border-start-0" id="rol_id" name="rol_id" required>
                        <option value="" disabled selected>Selecciona tu rol para testing</option>
                        {% for rol in roles %}
                            <option value="{{ rol.id }}">{{ rol.nombre_rol }} - {{ rol.descripcion }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-user-plus me-2"></i>Registrarse</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-1">¿Ya tienes una cuenta?</p>
            <a href="{{ url_for('auth.login') }}" class="text-primary small fw-semibold">Iniciar Sesión</a>
        </div>
        <div class="text-center mt-3 border-top pt-3">
            <a href="{{ url_for('propiedades.list_propiedades') }}" class="text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Ver catálogo público</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
