<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inmobiliaria TEM742</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 class="mb-1 text-primary font-weight-bold"><i class="fa-solid fa-hotel me-2"></i>TEM742</h2>
            <p class="text-muted">Ingresa a tu cuenta inmobiliaria</p>
        </div>

        <!-- Flash alerts -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show small" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login', next=request.args.get('next')) }}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Nombre de Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" required placeholder="Usuario (Ej. admin)">
                </div>
            </div>

            <div class="mb-4">
                <label for="contrasena" class="form-label fw-semibold">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="contrasena" name="contrasena" required placeholder="Contraseña (Ej. admin123)">
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket me-2"></i>Ingresar</button>
            </div>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-1">¿No tienes una cuenta registrada?</p>
            <a href="{{ url_for('auth.register') }}" class="text-primary small fw-semibold">Crear Cuenta Nueva</a>
        </div>
        <div class="text-center mt-3 border-top pt-3">
            <a href="{{ url_for('propiedades.list_propiedades') }}" class="text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Ver catálogo público</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
